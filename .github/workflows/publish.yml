name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm
    steps:
      - name: Check out release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"
          cache: npm

      - name: Verify trusted-publishing toolchain
        run: |
          node --input-type=module <<'NODE'
          import { execFileSync } from "node:child_process";

          const minimumNode = 24;
          const minimumNpm = [11, 5, 1];
          const nodeVersion = process.versions.node;
          const npmVersion = execFileSync("npm", ["--version"], { encoding: "utf8" }).trim();
          const npmParts = npmVersion.split(".").map(Number);
          const npmIsCurrentEnough =
            npmParts[0] > minimumNpm[0] ||
            (npmParts[0] === minimumNpm[0] &&
              (npmParts[1] > minimumNpm[1] ||
                (npmParts[1] === minimumNpm[1] && npmParts[2] >= minimumNpm[2])));

          if (Number(nodeVersion.split(".")[0]) < minimumNode) {
            throw new Error(`Node.js ${minimumNode}+ is required; found ${nodeVersion}.`);
          }
          if (npmParts.some(Number.isNaN) || !npmIsCurrentEnough) {
            throw new Error(`npm ${minimumNpm.join(".")}+ is required; found ${npmVersion}.`);
          }
          console.log(`Trusted-publishing toolchain: Node.js ${nodeVersion}, npm ${npmVersion}`);
          NODE

      - name: Verify release source
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          PACKAGE_VERSION="$(node -p 'JSON.parse(require("node:fs").readFileSync("package.json", "utf8")).version')"
          test "$RELEASE_TAG" = "v$PACKAGE_VERSION"
          git fetch --no-tags origin main:refs/remotes/origin/main
          git merge-base --is-ancestor HEAD origin/main

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Smoke test CLI
        run: node dist/cli/main.js schema

      - name: Check package contents
        run: npm run check:pack

      - name: Publish package
        run: npm publish --access public --provenance
