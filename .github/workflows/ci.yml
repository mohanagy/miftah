name: CI

on:
  pull_request:
    branches: [development, main]
  push:
    branches: [development, main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  linux-quality:
    name: Linux quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Enforce critical coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Smoke test CLI
        run: npm run smoke:cli

      - name: Check package contents
        run: npm run check:pack

  compatibility:
    name: Core and CLI (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ["20", "22", "24"]
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Verify Windows helper source and artifact
        if: ${{ runner.os == 'Windows' && matrix.node == '22' }}
        shell: powershell
        run: ./scripts/verify-windows-secret-job-assembly.ps1

      - name: Install dependencies
        run: npm ci

      - name: Test core contracts
        run: npm run test:core

      - name: Test CLI compatibility
        run: npm run test:cli

  verify:
    name: Verify
    if: ${{ always() }}
    needs: [linux-quality, compatibility]
    runs-on: ubuntu-latest
    steps:
      - name: Require successful prerequisite jobs
        env:
          LINUX_QUALITY_RESULT: ${{ needs.linux-quality.result }}
          COMPATIBILITY_RESULT: ${{ needs.compatibility.result }}
        run: |
          test "$LINUX_QUALITY_RESULT" = "success"
          test "$COMPATIBILITY_RESULT" = "success"
